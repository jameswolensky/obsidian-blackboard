<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Blackboard stylus-alignment — WebKit harness (real engine)</title>
<style>
  html, body { background: #161616; color: #dcddde; margin: 0; font-family: -apple-system, system-ui, sans-serif; }
  .label { padding: 14px 16px 4px; font-size: 15px; }
  .sub { padding: 0 16px 10px; font-size: 13px; color: #8a8a8a; }
  #stages { padding: 8px 8px; }
  pre { color: #0f0; font-size: 13px; padding: 10px 16px; white-space: pre-wrap; }
</style>
</head>
<body class="is-mobile is-tablet is-ios theme-dark">
<div class="label">Stylus alignment under Canvas zoom — uses the REAL DrawingEngine.</div>
<div class="sub">PASS = each cyan ink dot sits exactly under its red crosshair (the simulated tap point), at non-100% zoom. FAIL = dot drifts away from the crosshair, worse farther out (the reported bug).</div>
<div id="stages"></div>
<pre id="dump"></pre>

<script type="module">
import { DrawingEngine } from './_engine.mjs?v=CACHEBUST';

function crosshair(x, y) {
  const c = document.createElement('div');
  c.style.cssText = `position:fixed;left:${x}px;top:${y}px;z-index:20;pointer-events:none;`;
  c.innerHTML =
    `<div style="position:absolute;left:-13px;top:-1px;width:26px;height:2px;background:#ff3b30"></div>` +
    `<div style="position:absolute;left:-1px;top:-13px;width:2px;height:26px;background:#ff3b30"></div>`;
  document.body.appendChild(c);
}

function makeStage(zoom, withContent, label) {
  const slot = document.createElement('div');
  slot.style.cssText = `display:inline-block;vertical-align:top;width:${300 * zoom + 40}px;height:${240 * zoom + 50}px;`;
  const wrap = document.createElement('div');
  wrap.style.cssText = `transform:scale(${zoom});transform-origin:top left;margin:20px;display:inline-block;`;
  const surface = document.createElement('div');
  surface.style.cssText = 'width:280px;height:200px;position:relative;background:#1e1e1e;border:1px solid #4a4a4a;';
  wrap.appendChild(surface);
  slot.appendChild(wrap);
  document.getElementById('stages').appendChild(slot);

  const eng = new DrawingEngine(surface, surface.clientWidth, surface.clientHeight);
  eng.toolManager.setTool('pen');
  eng.toolManager.setColor('#22e0e0');
  eng.toolManager.setSize(20);
  if (withContent) {
    // Pre-existing content makes the view non-identity (scaled to fit) — the harder case.
    eng.loadStrokes([{ id: 'c', tool: 'pen', color: '#777', size: 4, opacity: 1,
      points: [[20, 20, 0.5], [260, 180, 0.5]], hasPressure: false, timestamp: 0 }]);
  }
  eng.setDisplaySize(surface.clientWidth, surface.clientHeight);
  eng.refitToContent(8);   // set the view once; do NOT refit between taps (stable, like a focus session)

  // Simulate taps spread across the surface's on-screen (zoom-scaled) rect.
  const r = surface.getBoundingClientRect();
  const pts = [
    { x: r.left + r.width * 0.18, y: r.top + r.height * 0.22 },
    { x: r.left + r.width * 0.82, y: r.top + r.height * 0.28 },
    { x: r.left + r.width * 0.50, y: r.top + r.height * 0.55 },
    { x: r.left + r.width * 0.30, y: r.top + r.height * 0.85 },
  ];
  for (const p of pts) {
    const [dx, dy] = eng.screenToDrawing(p.x, p.y, surface);
    eng.beginStroke('pen');
    eng.addPoint([dx, dy, 0.5]);
    eng.endStroke();
    crosshair(p.x, p.y);
  }
  eng.render();
  return `${label}: zoom ${zoom}  viewScale ${eng.getViewTransform().scale.toFixed(3)}  surface ${surface.clientWidth}x${surface.clientHeight}  rect ${r.width.toFixed(0)}x${r.height.toFixed(0)}`;
}

const lines = [];
lines.push(makeStage(1.6, false, 'A zoomed-in, empty (identity view)'));
lines.push(makeStage(0.6, true, 'B zoomed-out, with content (non-identity view)'));
document.getElementById('dump').textContent = lines.join('\n');
</script>
</body>
</html>
