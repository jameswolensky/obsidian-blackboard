name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - name: Lint (Obsidian review rules)
        run: npm run lint
      - name: TypeScript check
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
